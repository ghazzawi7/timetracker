<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />

    <!-- VIEWPORT — viewport-fit=cover extends behind notch/home-bar -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- STANDALONE MODE — removes Safari UI when launched from home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent lets the app render content behind the status bar -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DayRhythm" />

    <!-- THEME COLOR — light + dark -->

    <!-- PREVENT TRANSLATION POPUP -->
    <meta name="google" content="notranslate" />
    <meta name="translate" content="no" />

    <!-- HOME SCREEN ICONS — iOS rounds corners automatically -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />

    <link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png" />
